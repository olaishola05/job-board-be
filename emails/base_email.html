<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JobBoard{% endblock %}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f4;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
    }

    .header {
      background-color: #2563eb;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin: 0;
    }

    .content {
      padding: 30px;
    }

    .footer {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin: 15px 0;
    }

    .button:hover {
      background-color: #1d4ed8;
    }

    .alert {
      padding: 15px;
      margin: 15px 0;
      border-radius: 5px;
    }

    .alert-success {
      background-color: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .alert-info {
      background-color: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>{% block header %}JobBoard{% endblock %}</h1>
    </div>

    <div class="content">
      {% block content %}{% endblock %}
    </div>

    <div class="footer">
      <p>&copy; 2024 JobBoard. All rights reserved.</p>
      <p>
        <a href="#" style="color: #666;">Unsubscribe</a> |
        <a href="#" style="color: #666;">Privacy Policy</a> |
        <a href="#" style="color: #666;">Contact Us</a>
      </p>
    </div>
  </div>
</body>

</html>
