name: Job Board CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop", "feature/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.11, 3.12]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        # Add health checks so Django waits for Postgres
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3-management-alpine # Lightweight RabbitMQ image
        ports:
          - 5672:5672 # Standard AMQP port
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
      DJANGO_SETTINGS_MODULE: job_platform.settings
      SECRET_KEY: test_secret_key

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create reports directory
        run: |
          mkdir -p reports
          mkdir -p static
      - name: Wait for (Postgres and RabbitMQ)
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

          until nc -z localhost 5672; do
            echo "Waiting for RabbitMQ (5672)..."
            sleep 2
          done
      - name: Run Tests
        run: |
          python3 manage.py migrate --noinput
          python3 manage.py collectstatic --noinput
          pytest --disable-warnings -v --cov=. --cov-report=term-missing --cov-report=xml
